<VirtualHost *:80>

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    Alias /moodle /var/www/moodle/public

    <Directory /var/www/moodle/public>
        AllowOverride All
        Options FollowSymLinks
        Require all granted

        DirectoryIndex index.php
    </Directory>

</VirtualHost>