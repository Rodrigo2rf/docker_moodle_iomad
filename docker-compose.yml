services:
  php-apache:
    image: php:8.4-apache
    container_name: php-8.4-apache
    volumes:
      - .:/var/www/
    build: ./
    ports:
      - 8081:80
    depends_on:
      - db
    
  db:
    image: mysql:latest
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: moodle_iomad_user
      MYSQL_PASSWORD: moodle_iomad_password
      MYSQL_DATABASE: moodle_iomad_db
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql

    # Database Management Tool
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306

volumes:
  mysql: